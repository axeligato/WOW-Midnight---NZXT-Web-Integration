<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoW Midnight — Kraken Integration</title>
  <style>
    @font-face {
      font-family: 'FRISQUAD';
      src: url('./font/FRISQUAD.ttf') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'FRISQUAD', serif;
    }

    .container {
      position: relative;
      border-radius: 50%;
      width: 100%;
      height: 100%;
    }

    #background {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .data {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(
        circle at center,
        rgba(0, 0, 0, 0.45) 0%,
        transparent 70%
      );
    }

    /* ── Pulsing arcane glow ─────────────────────────────── */
    @keyframes arcane-pulse {
      0%, 100% {
        filter:
          drop-shadow(0 0 6px  rgba(201, 168, 76,  0.9))
          drop-shadow(0 0 18px rgba(160, 100, 255, 0.5))
          drop-shadow(0 0 35px rgba(130, 60,  255, 0.25));
      }
      50% {
        filter:
          drop-shadow(0 0 10px rgba(201, 168, 76,  0.6))
          drop-shadow(0 0 35px rgba(160, 100, 255, 0.95))
          drop-shadow(0 0 65px rgba(130, 60,  255, 0.55));
      }
    }

    /* ── Gradient text shared styles ─────────────────────── */
    .data h1,
    .data p {
      background: linear-gradient(
        160deg,
        #c9a84c  0%,
        #edd97a  28%,
        #c4a8ff  62%,
        #9b6bff  100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: arcane-pulse 3s ease-in-out infinite;
    }

    .data h1 {
      font-size: 5vw;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .data p {
      margin: 0;
      font-size: 18.75vw;
      line-height: 1;
    }

    .unit {
      font-size: 9vw;
    }
  </style>
</head>
<body>

  <div class="container">
    <img id="background" src="./public/background.png" alt="WoW Midnight" />
    <div class="data">
      <h1 id="source">GPU</h1>
      <p><span id="temperature">--</span><span class="unit">°C</span></p>
    </div>
  </div>

  <script>
    const params = (new URL(window.location.href)).searchParams
    const source = params.get('source') || 'gpu'
    document.getElementById('source').innerText = source.toUpperCase()

    function updateTemperature(temperature) {
      document.getElementById('temperature').innerText = Math.round(temperature)
    }

    window.nzxt = {
      v1: {
        onMonitoringDataUpdate: (data) => {
          const { cpus, gpus } = data
          updateTemperature((source === 'cpu' ? cpus : gpus)[0].temperature)
        }
      }
    }
  </script>
</body>
</html>

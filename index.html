<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoW Midnight — Kraken Integration</title>
  <style>
    @font-face {
      font-family: 'FRISQUAD';
      src: url('./font/FRISQUAD.ttf') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'FRISQUAD', serif;
    }

    .container {
      position: relative;
      border-radius: 50%;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #background {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      animation: spin 60s linear infinite;
    }

    .data {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5vw;
    }

    /* ── WoW login button style ───────────────────────────── */
    .wow-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.6vw 4vw;
      /* dark semi-transparent fill with red tint */
      background: linear-gradient(180deg,
        rgba(80, 10, 10, 0.82) 0%,
        rgba(40, 4, 4, 0.90)  50%,
        rgba(60, 8, 8, 0.82) 100%
      );
      /* red-toned border like the WoW buttons */
      border: 1px solid #7a2020;
      border-bottom-color: #3a0a0a;
      border-top-color: #c04040;
      border-radius: 3px;
      /* outer glow + depth shadow */
      box-shadow:
        0 0 6px rgba(180, 40, 40, 0.5),
        0 2px 8px rgba(0, 0, 0, 0.85),
        inset 0 1px 0 rgba(255, 120, 120, 0.18),
        inset 0 -1px 0 rgba(0, 0, 0, 0.5);
      min-width: 28vw;
    }

    /* GPU label button — slightly smaller */
    .btn-label {
      font-size: 4.5vw;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #ffffff;
      -webkit-text-stroke: 1px #000;
      text-shadow:
        0 0 8px rgba(255, 160, 160, 0.6),
        0 1px 3px rgba(0,0,0,0.95);
    }

    /* Temperature button — big */
    .btn-temp {
      font-size: 18.75vw;
      line-height: 1;
      color: #ffffff;
      -webkit-text-stroke: 2px #000;
      text-shadow:
        0 0 10px rgba(255, 160, 160, 0.5),
        0 2px 4px rgba(0,0,0,0.95);
    }

    .unit {
      font-size: 9vw;
      -webkit-text-stroke: 1px #000;
    }
  </style>
</head>
<body>

  <div class="container">
    <img id="background" src="./public/background.png" alt="WoW Midnight" />
    <div class="data">

      <!-- GPU label button -->
      <div class="wow-btn">
        <span class="btn-label" id="source">GPU</span>
      </div>

      <!-- Temperature button -->
      <div class="wow-btn">
        <span class="btn-temp"><span id="temperature">--</span><span class="unit">°C</span></span>
      </div>

    </div>
  </div>

  <script>
    let source = 'gpu'
    try {
      const params = (new URL(window.location.href)).searchParams
      source = params.get('source') || 'gpu'
    } catch(e) {}
    document.getElementById('source').innerText = source.toUpperCase()

    function updateTemperature(temperature) {
      document.getElementById('temperature').innerText = Math.round(temperature)
    }

    window.nzxt = {
      v1: {
        onMonitoringDataUpdate: (data) => {
          const { cpus, gpus } = data
          updateTemperature((source === 'cpu' ? cpus : gpus)[0].temperature)
        }
      }
    }
  </script>
</body>
</html>

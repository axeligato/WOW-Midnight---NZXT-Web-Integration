<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoW Midnight — Kraken Integration</title>
  <style>
    @font-face {
      font-family: 'FRISQUAD';
      src: url('./font/FRISQUAD.ttf') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'FRISQUAD', serif;
    }

    .container {
      position: relative;
      border-radius: 50%;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #background {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      animation: spin 60s linear infinite;
    }

    .data {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5vw;
    }

    /* ── WoW button CSS variable system ─────────────────── */
    .button {
      --button-color-background-default: linear-gradient(180deg, #501010 0%, #280404 50%, #3c0808 100%);
      --button-color-text-default:       #f5c518;
      --button-border-color-default:     #7a2020;
      --button-border-width-default:     2px;
      --button-padding:                  3vw;
      --button-font:                     700 4.5vw 'FRISQUAD', serif;
      --button-shadow:
        0 0 6px rgba(180, 40, 40, 0.8),
        0 2px 8px rgba(0, 0, 0, 0.9),
        inset 0 1px 0 rgba(255, 120, 120, 0.2),
        inset 0 -1px 0 rgba(0, 0, 0, 0.6);

      --button-border-color:     var(--button-border-color-default);
      --button-border-width:     var(--button-border-width-default);
      --button-color-background: var(--button-color-background-default);
      --button-color-text:       var(--button-color-text-default);

      background:      var(--button-color-background);
      border:          var(--button-border-width) solid var(--button-border-color);
      border-radius:   10px;
      box-shadow:      var(--button-shadow);
      box-sizing:      border-box;
      color:           var(--button-color-text);
      cursor:          default;
      font:            var(--button-font);
      outline-offset:  0;
      overflow:        hidden;
      padding:         1vw calc(var(--button-padding) - var(--button-border-width));
      text-align:      center;
      text-decoration: none;
      text-overflow:   ellipsis;
      white-space:     nowrap;
      min-width:       28vw;
      -webkit-text-stroke: 1px #000;
    }

    .button.btn-temp {
      --button-font: 700 18.75vw 'FRISQUAD', serif;
      padding:        0 calc(var(--button-padding) - var(--button-border-width));
      line-height:    0.75;
      -webkit-text-stroke: 2px #000;
    }

    .unit {
      font-size: 9vw;
      -webkit-text-stroke: 1px #000;
    }
  </style>
</head>
<body>

  <div class="container">
    <img id="background" src="./public/background.png" alt="WoW Midnight" />
    <div class="data">

      <div class="button">
        <span id="source">GPU</span>
      </div>

      <div class="button btn-temp">
        <span id="temperature">--</span><span class="unit">°C</span>
      </div>

    </div>
  </div>

  <script>
    let source = 'gpu'
    try {
      const params = (new URL(window.location.href)).searchParams
      source = params.get('source') || 'gpu'
    } catch(e) {}
    document.getElementById('source').innerText = source.toUpperCase()

    function updateTemperature(temperature) {
      document.getElementById('temperature').innerText = Math.round(temperature)
    }

    window.nzxt = {
      v1: {
        onMonitoringDataUpdate: (data) => {
          const { cpus, gpus } = data
          updateTemperature((source === 'cpu' ? cpus : gpus)[0].temperature)
        }
      }
    }
  </script>
</body>
</html>

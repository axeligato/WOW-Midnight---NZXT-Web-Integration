<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoW Midnight — Kraken Integration</title>
  <style>
    @font-face {
      font-family: 'FRISQUAD';
      src: url('./font/FRISQUAD.ttf') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'FRISQUAD', serif;
    }

    .container {
      position: relative;
      border-radius: 50%;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #background {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      animation: spin 60s linear infinite;
    }

    .data {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(
        circle at center,
        rgba(0, 0, 0, 0.45) 0%,
        transparent 70%
      );
    }

    .data h1 {
      font-size: 5vw;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #ffffff;
      -webkit-text-stroke: 1px #3b1f0e;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    .data p {
      margin: 0;
      font-size: 18.75vw;
      line-height: 1;
      color: #ffffff;
      -webkit-text-stroke: 2px #3b1f0e;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    .unit {
      font-size: 9vw;
    }
  </style>
</head>
<body>

  <div class="container">
    <img id="background" src="./public/background.png" alt="WoW Midnight" />
    <div class="data">
      <h1 id="source">GPU</h1>
      <p><span id="temperature">--</span><span class="unit">°C</span></p>
    </div>
  </div>

  <script>
    let source = 'gpu'
    try {
      const params = (new URL(window.location.href)).searchParams
      source = params.get('source') || 'gpu'
    } catch(e) {}
    document.getElementById('source').innerText = source.toUpperCase()

    function updateTemperature(temperature) {
      document.getElementById('temperature').innerText = Math.round(temperature)
    }

    window.nzxt = {
      v1: {
        onMonitoringDataUpdate: (data) => {
          const { cpus, gpus } = data
          updateTemperature((source === 'cpu' ? cpus : gpus)[0].temperature)
        }
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoW Midnight — Kraken Integration</title>
  <style>
    @font-face {
      font-family: 'FRISQUAD';
      src: url('./font/FRISQUAD.ttf') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'FRISQUAD', serif;
    }

    .container {
      position: relative;
      border-radius: 50%;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #background {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      animation: spin 60s linear infinite;
    }

    .data {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Red WoW-style button box ─────────────────────────── */
    .text-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5vw 5vw 2vw;
      background: linear-gradient(180deg, #8b0000 0%, #5a0000 100%);
      border: 2px solid #4a4a4a;
      border-radius: 10px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.15),
        0 4px 16px rgba(0,0,0,0.85);
    }

    .data h1 {
      font-size: 5vw;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #ffffff;
      -webkit-text-stroke: 1px #000000;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    }

    .data p {
      margin: 0;
      font-size: 18.75vw;
      line-height: 1;
      color: #ffffff;
      -webkit-text-stroke: 2px #000000;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    }

    .unit {
      font-size: 9vw;
    }
  </style>
</head>
<body>

  <div class="container">
    <img id="background" src="./public/background.png" alt="WoW Midnight" />
    <div class="data">
      <div class="text-box">
        <h1 id="source">GPU</h1>
        <p><span id="temperature">--</span><span class="unit">°C</span></p>
      </div>
    </div>
  </div>

  <script>
    let source = 'gpu'
    try {
      const params = (new URL(window.location.href)).searchParams
      source = params.get('source') || 'gpu'
    } catch(e) {}
    document.getElementById('source').innerText = source.toUpperCase()

    function updateTemperature(temperature) {
      document.getElementById('temperature').innerText = Math.round(temperature)
    }

    window.nzxt = {
      v1: {
        onMonitoringDataUpdate: (data) => {
          const { cpus, gpus } = data
          updateTemperature((source === 'cpu' ? cpus : gpus)[0].temperature)
        }
      }
    }
  </script>
</body>
</html>
